[TRIDENT - Active Incidents Alert]
action.email.useNSSubject = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 5m
alert.track = 1
counttype = number of events
cron_schedule = * * * * *
description = Real-time alert when new incident appears in the TRIDENT queue
disabled = 0
dispatch.earliest_time = -5m@m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 1
quantity = 0
relation = greater than
search = index=trident_incidents sourcetype=trident:incident status="OPEN" | dedup incident_id | sort -severity_score | head 20 | table incident_id, timestamp, severity, severity_score, title, status

[TRIDENT - CDTSM Anomaly Detection]
action.email.useNSSubject = 1
alert.severity = 3
alert.track = 1
cron_schedule = * * * * *
description = Scheduled every 1 minute — monitors CDTSM anomaly detection results
disabled = 0
dispatch.earliest_time = -2m@m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 1
search = index=trident_incidents sourcetype=trident:incident | spath output=anomaly_detected path=agent_trace.telemetry_sentinel.anomaly_detected | where anomaly_detected="true" | sort -_time | head 5 | table _time, incident_id, severity, title

[TRIDENT - MCP Security Audit]
action.email.useNSSubject = 1
alert.severity = 5
alert.suppress = 0
alert.track = 1
cron_schedule = * * * * *
description = Real-time monitoring of MCP JSON-RPC validation — alerts on security violations
disabled = 0
dispatch.earliest_time = -2m@m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 1
search = index=trident_audit sourcetype=trident:audit security_violation=true | sort -_time | head 50 | table _time, rpc_id, method, violation_type, pattern

[TRIDENT - Platform Health Baseline]
cron_schedule = 0 * * * *
description = Hourly platform health metrics baseline
disabled = 0
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
enableSched = 1
search = | rest /services/search/jobs | where dispatchState="RUNNING" | stats count as running_jobs, avg(runDuration) as avg_duration, max(runDuration) as max_duration | eval health_status=if(running_jobs > 50, "WARNING", "HEALTHY")
